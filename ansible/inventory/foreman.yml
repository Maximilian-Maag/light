# Dynamic inventory — Foreman is the single source of truth for all hosts.
# Connection params (url, user, password) are read from environment variables
# FOREMAN_SERVER_URL, FOREMAN_USER, FOREMAN_PASSWORD set by docker-compose.
plugin: theforeman.foreman.foreman

validate_certs: false

group_prefix: "function_"
vars_prefix:  "foreman_"

want_facts: true
want_params: true
