---
- name: Copy Checkmk agent to target host
  copy:
    src: /tmp/check-mk-agent.deb
    dest: /tmp/check-mk-agent.deb
    mode: "0644"
  when: ansible_facts['os_family'] == "Debian"

- name: Install Checkmk agent
  apt:
    deb: /tmp/check-mk-agent.deb
    state: present
  when: ansible_facts['os_family'] == "Debian"

- name: Enable and start Checkmk agent socket
  service:
    name: check_mk.socket
    state: started
    enabled: true

- name: Allow Checkmk agent port in UFW
  community.general.ufw:
    rule: allow
    to_port: "6556"
    proto: tcp
    from_ip: "{{ checkmk_server }}"
    direction: in
