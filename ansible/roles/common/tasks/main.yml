---
# Common baseline tasks — runs on every host in every environment.
# Puppet will re-enforce these on its 30-min pull cycle.
#
# Order matters: packages must be installed before their config dirs exist,
# and apt must be updated with the existing system sources before we switch
# to the Pulp mirror (Pulp may not be synced yet on first run).

- name: Update apt cache with system sources
  apt:
    update_cache: true
    cache_valid_time: 3600
  async: 300
  poll: 15

- name: Install base packages
  apt:
    name:
      - curl
      - ca-certificates
      - chrony
      - ufw
      - netcat-openbsd
      - logwatch
    state: present

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Configure /etc/hosts
  lineinfile:
    path: /etc/hosts
    line: "127.0.1.1 {{ inventory_hostname }}.{{ domain }} {{ inventory_hostname }}"
    regexp: "^127\\.0\\.1\\.1"

- name: Configure DNS via systemd-resolved
  template:
    src: resolved.conf.j2
    dest: /etc/systemd/resolved.conf
    mode: "0644"
  notify: restart systemd-resolved

- name: Configure NTP via chrony
  template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    mode: "0644"
  notify: restart chrony

- name: Harden SSH configuration
  template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    mode: "0600"
    validate: "sshd -t -f %s"
  notify: restart ssh

- name: Set UFW default inbound policy to deny
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Set UFW default outbound policy to deny
  community.general.ufw:
    state: enabled
    policy: deny
    direction: outgoing

- name: Allow SSH inbound from management zone
  community.general.ufw:
    rule: allow
    to_port: "22"
    proto: tcp
    from_ip: "{{ mgmt_zone_cidr }}"
    direction: in

- name: Allow Checkmk agent polling inbound
  community.general.ufw:
    rule: allow
    to_port: "6556"
    proto: tcp
    from_ip: "{{ checkmk_server }}"
    direction: in

- name: Allow outbound DNS queries
  community.general.ufw:
    rule: allow
    to_ip: "{{ item[0] }}"
    to_port: "53"
    proto: "{{ item[1] }}"
    direction: out
  loop: "{{ dns_servers | product(['tcp', 'udp']) | list }}"
  loop_control:
    label: "DNS {{ item[0] }} {{ item[1] }}"

- name: Allow outbound NTP
  community.general.ufw:
    rule: allow
    to_ip: "{{ item }}"
    to_port: "123"
    proto: udp
    direction: out
  loop: "{{ ntp_servers }}"
  loop_control:
    label: "NTP {{ item }}"

- name: Allow outbound to Puppet server
  community.general.ufw:
    rule: allow
    to_ip: "{{ puppet_server }}"
    to_port: "8140"
    proto: tcp
    direction: out

- name: Allow outbound to Pulp mirror
  community.general.ufw:
    rule: allow
    to_ip: "{{ pulp_server }}"
    to_port: "{{ item }}"
    proto: tcp
    direction: out
  loop:
    - "80"
    - "443"
  loop_control:
    label: "Pulp port {{ item }}"

- name: Allow outbound to Checkmk for registration
  community.general.ufw:
    rule: allow
    to_ip: "{{ checkmk_server }}"
    to_port: "{{ checkmk_port | default('5000') }}"
    proto: tcp
    direction: out

- name: Switch APT to Pulp mirror
  template:
    src: apt-sources.list.j2
    dest: /etc/apt/sources.list
    mode: "0644"
