---
- name: Install nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Deploy nginx configuration
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
    validate: "nginx -t -c %s"
  notify: reload nginx

- name: Enable and start nginx
  service:
    name: nginx
    state: started
    enabled: true

- name: Allow HTTP inbound
  community.general.ufw:
    rule: allow
    to_port: "80"
    proto: tcp
    direction: in

- name: Allow HTTPS inbound
  community.general.ufw:
    rule: allow
    to_port: "443"
    proto: tcp
    direction: in
