---
# Deploy a service bubble — applies bubble-ufw isolation rules and then
# each member's application role, as declared in config/topology.json.
#
# Required variable: bubble_name  (e.g. nextcloud)
# Group vars for the bubble are in ansible/group_vars/bubble_<name>.yml
# and are generated by scripts/gen-topology.sh from config/topology.json.
#
# Called by startup.sh dev with: -e bubble_name=<name> --limit bubble_<name>
#
# The bubble_members list (from group_vars) drives which role runs on which host.
# Each member's "role" field in topology.json maps to an Ansible role in
# either ansible/roles/ or bubbles/<bubble_name>/ansible/roles/.

- name: "Apply bubble network isolation ({{ bubble_name }})"
  hosts: "bubble_{{ bubble_name }}"
  become: true
  gather_facts: true
  roles:
    - role: bubble-ufw

- name: "Deploy application roles for bubble ({{ bubble_name }})"
  hosts: "bubble_{{ bubble_name }}"
  become: true
  gather_facts: true
  tasks:
    - name: Determine this member's application role
      set_fact:
        member_role: >-
          {{ (bubble_members
              | selectattr('name', 'equalto', inventory_hostname)
              | map(attribute='role')
              | first) | default('') }}

    - name: Apply application role
      include_role:
        name: "{{ member_role }}"
      when: member_role != ''
