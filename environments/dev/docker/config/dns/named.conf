// BIND9 configuration for light dev environment
// Serves the domain configured in LIGHT_DOMAIN (default: simple-test.org)
// and provides recursive resolution for all management/workload hosts.

options {
    directory "/var/cache/bind";

    // Only listen on the management zone network
    listen-on { any; };
    listen-on-v6 { none; };

    // Allow queries from management zone and all bubble subnets (10.20.0.0/16)
    allow-query { 10.10.0.0/24; 10.20.0.0/16; 127.0.0.1; };

    // Recursive queries — bubbles need external resolution for Pulp sync and package names
    recursion yes;
    allow-recursion { 10.10.0.0/24; 10.20.0.0/16; };

    forwarders { 1.1.1.1; 8.8.8.8; };
    forward only;

    dnssec-validation no;
};

// Internal forward zone — all management and workload hosts
zone "simple-test.org" {
    type master;
    file "/etc/bind/zones/db.simple-test.org";
    allow-update { none; };
};

// Reverse zone — management zone (10.10.0.x)
zone "0.10.10.in-addr.arpa" {
    type master;
    file "/etc/bind/zones/db.10.10.0";
    allow-update { none; };
};

// Reverse zone — workload zone (10.20.0.x)
zone "0.20.10.in-addr.arpa" {
    type master;
    file "/etc/bind/zones/db.10.20.0";
    allow-update { none; };
};
