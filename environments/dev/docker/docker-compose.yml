# Dev environment — full management zone + workload nodes
# Every service here mirrors what runs in staging and prod.
# Network topology:
#   mgmt-zone:  management services only (10.10.0.0/24)
#   workload:   workload nodes (10.20.0.0/24)
#   jumphost bridges both networks (the only entry point)

networks:
  mgmt-zone:
    driver: bridge
    ipam:
      config:
        - subnet: "${MGMT_ZONE_CIDR:-10.10.0.0/24}"
  workload:
    driver: bridge
    ipam:
      config:
        - subnet: "${WORKLOAD_CIDR:-10.20.0.0/24}"

volumes:
  foreman-data:
  puppet-data:
  checkmk-data:
  pulp-data:
  pulp-db:
  dns-data:

services:

  # ── DNS (primary) ───────────────────────────────────────────────────────────
  dns-primary:
    image: internetsystemsconsortium/bind9:9.18
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-dns-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-dns-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_DNS_PRIMARY:-10.10.0.30}"
    volumes:
      - dns-data:/etc/bind
      - ./config/dns/named.conf:/etc/bind/named.conf:ro
      - ./config/dns/zones:/etc/bind/zones:ro
    restart: unless-stopped

  # ── NTP (primary) ──────────────────────────────────────────────────────────
  ntp-primary:
    image: cturra/ntp:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ntp-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ntp-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_NTP_PRIMARY:-10.10.0.32}"
    cap_add:
      - SYS_TIME
    restart: unless-stopped

  # ── Pulp (package mirror) ──────────────────────────────────────────────────
  pulp:
    image: pulp/pulp:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-upd-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-upd-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_PULP:-10.10.0.24}"
    volumes:
      - pulp-data:/var/lib/pulp
      - pulp-db:/var/lib/pgsql
    environment:
      PULP_ADMIN_PASSWORD: "${PULP_ADMIN_PASS:-changeme}"
    ports:
      - "8080:80"
      - "8443:443"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Puppet (baseline enforcement, pull every 30 min) ──────────────────────
  puppet:
    image: ghcr.io/voxpupuli/puppetserver:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-bas-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-bas-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_PUPPET:-10.10.0.21}"
    volumes:
      - puppet-data:/etc/puppetlabs
      - ../../../puppet/manifests:/etc/puppetlabs/code/environments/production/manifests:ro
    environment:
      PUPPETSERVER_HOSTNAME: "${IP_PUPPET:-10.10.0.21}"
      DNS_ALT_NAMES: "puppet,puppet.${LIGHT_DOMAIN:-simple-test.org}"
    ports:
      - "8140:8140"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Foreman (inventory + lifecycle) ───────────────────────────────────────
  foreman:
    image: theforeman/foreman:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-frm-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-frm-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_FOREMAN:-10.10.0.20}"
    volumes:
      - foreman-data:/etc/foreman
    environment:
      FOREMAN_ADMIN_USERNAME: "${FOREMAN_ADMIN_USER:-admin}"
      FOREMAN_ADMIN_PASSWORD: "${FOREMAN_ADMIN_PASS:-changeme}"
      PUPPET_SERVER: "${IP_PUPPET:-10.10.0.21}"
    ports:
      - "9443:443"
      - "9090:9090"
    depends_on:
      - puppet
      - dns-primary
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Ansible controller (push-based app deployment) ────────────────────────
  ansible:
    build:
      context: ./build/ansible
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ans-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ans-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_ANSIBLE:-10.10.0.22}"
    volumes:
      - ../../../ansible:/opt/ansible:ro
      - "${ADMIN_SSH_KEY_PATH%.*}:/root/.ssh/id_ed25519:ro"
    environment:
      FOREMAN_URL: "https://${IP_FOREMAN:-10.10.0.20}"
      FOREMAN_USER: "${FOREMAN_ADMIN_USER:-admin}"
      FOREMAN_PASSWORD: "${FOREMAN_ADMIN_PASS:-changeme}"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Checkmk (monitoring) ──────────────────────────────────────────────────
  checkmk:
    image: checkmk/check-mk-raw:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-mon-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-mon-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_CHECKMK:-10.10.0.23}"
    volumes:
      - checkmk-data:/omd/sites
    environment:
      CMK_ADMIN_PASSWORD: "${CHECKMK_ADMIN_PASS:-changeme}"
    ports:
      - "5000:5000"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Jumphost (SSH bastion — only external entry point) ────────────────────
  jumphost:
    build:
      context: ./build/jumphost
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-vpn-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-vpn-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_JUMPHOST:-10.10.0.10}"
      workload: {}
    volumes:
      - "${ADMIN_SSH_KEY_PATH}:/etc/jumphost/authorized_keys:ro"
    ports:
      - "2222:22"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Workload: web server ──────────────────────────────────────────────────
  workload-web-001:
    build:
      context: ./build/workload
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-web-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-web-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      workload:
        ipv4_address: "10.20.0.11"
    environment:
      PUPPET_SERVER: "${IP_PUPPET:-10.10.0.21}"
      CHECKMK_SERVER: "${IP_CHECKMK:-10.10.0.23}"
      PULP_SERVER: "${IP_PULP:-10.10.0.24}"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Workload: database ────────────────────────────────────────────────────
  workload-db-001:
    build:
      context: ./build/workload
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-db-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-db-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      workload:
        ipv4_address: "10.20.0.12"
    environment:
      PUPPET_SERVER: "${IP_PUPPET:-10.10.0.21}"
      CHECKMK_SERVER: "${IP_CHECKMK:-10.10.0.23}"
      PULP_SERVER: "${IP_PULP:-10.10.0.24}"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
