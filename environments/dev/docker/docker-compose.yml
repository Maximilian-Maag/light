# Dev environment — management zone only.
# Every management service mirrors what runs in staging and prod.
#
# Network topology:
#   mgmt-zone  10.10.0.0/24 — management services (Docker bridge)
#   bubble networks          — workload VMs on VirtualBox host-only networks
#                              (hybrid mode: Vagrant VMs) or Docker bridges
#                              (docker mode: docker-compose.topology.yml overlay)
#
# Cross-zone routing:
#   Jumphost, Ansible, Checkmk have NET_ADMIN so startup.sh can inject routes
#   to reach Vagrant VM networks via the Docker host as a router.

networks:
  mgmt-zone:
    driver: bridge
    ipam:
      config:
        - subnet: "${MGMT_ZONE_CIDR:-10.10.0.0/24}"

volumes:
  foreman-data:
  foreman-db:
  puppet-data:
  checkmk-data:
  pulp-data:
  pulp-db:


services:

  # ── DNS primary ─────────────────────────────────────────────────────────────
  dns-primary:
    image: internetsystemsconsortium/bind9:9.18
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-dns-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-dns-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_DNS_PRIMARY:-10.10.0.30}"
    volumes:
      - ./config/dns/named.conf:/etc/bind/named.conf:ro
      - ./config/dns/zones:/etc/bind/zones:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NTP primary ─────────────────────────────────────────────────────────────
  ntp-primary:
    image: cturra/ntp:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ntp-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ntp-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_NTP_PRIMARY:-10.10.0.32}"
    cap_add:
      - SYS_TIME
    restart: unless-stopped

  # ── Pulp (package mirror — only host with internet egress) ──────────────────
  pulp:
    image: pulp/pulp:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-upd-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-upd-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_PULP:-10.10.0.24}"
    volumes:
      - pulp-data:/var/lib/pulp
      - pulp-db:/var/lib/pgsql
    environment:
      PULP_ADMIN_PASSWORD: "${PULP_ADMIN_PASS:-changeme}"
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost/pulp/api/v3/status/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Puppet server (baseline enforcement, pull every 30 min) ─────────────────
  puppet:
    image: ghcr.io/voxpupuli/puppetserver:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-bas-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-bas-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_PUPPET:-10.10.0.21}"
    volumes:
      - puppet-data:/etc/puppetlabs
      - ../../../puppet/manifests:/etc/puppetlabs/code/environments/production/manifests:ro
      - ../../../puppet/modules:/etc/puppetlabs/code/environments/production/modules:ro
      - ../../../puppet/hiera.yaml:/puppet/hiera.yaml:ro
      - ../../../puppet/data:/etc/puppetlabs/code/environments/production/data:ro
    environment:
      PUPPETSERVER_HOSTNAME: "${IP_PUPPET:-10.10.0.21}"
      DNS_ALT_NAMES: "puppet,puppet.${LIGHT_DOMAIN:-simple-test.org}"
      HIERACONFIG: "/puppet/hiera.yaml"
    ports:
      - "127.0.0.1:8140:8140"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost:8140/status/v1/simple"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Foreman DB (PostgreSQL sidecar) ──────────────────────────────────────────
  foreman-db:
    image: postgres:15
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-frm-db"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_FOREMAN_DB:-10.10.0.19}"
    volumes:
      - foreman-db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: foreman
      POSTGRES_USER: foreman
      POSTGRES_PASSWORD: "${FOREMAN_DB_PASS:-foreman-dev}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "foreman"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Foreman (inventory + lifecycle — single source of truth) ─────────────────
  foreman:
    build:
      context: ./build/foreman
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-frm-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-frm-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_FOREMAN:-10.10.0.20}"
    volumes:
      - foreman-data:/etc/foreman
    environment:
      DB_HOST: "${IP_FOREMAN_DB:-10.10.0.19}"
      DB_USER: foreman
      DB_PASSWORD: "${FOREMAN_DB_PASS:-foreman-dev}"
      FOREMAN_ADMIN_USERNAME: "${FOREMAN_ADMIN_USER:-admin}"
      FOREMAN_ADMIN_PASSWORD: "${FOREMAN_ADMIN_PASS:-changeme}"
      PUPPET_SERVER: "${IP_PUPPET:-10.10.0.21}"
    ports:
      - "127.0.0.1:9090:3000"
    depends_on:
      foreman-db:
        condition: service_healthy
      puppet:
        condition: service_healthy
      dns-primary:
        condition: service_healthy
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000/api/v2/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  # ── Ansible controller (push deployment) ─────────────────────────────────────
  ansible:
    build:
      context: ./build/ansible
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ans-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-ans-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_ANSIBLE:-10.10.0.22}"
    cap_add:
      - NET_ADMIN
    volumes:
      - ../../../ansible:/opt/ansible:ro
      - "${ADMIN_SSH_KEY_PRIVATE}:/root/.ssh/id_ed25519:ro"
    environment:
      FOREMAN_SERVER_URL: "http://${IP_FOREMAN:-10.10.0.20}:3000"
      FOREMAN_USER: "${FOREMAN_ADMIN_USER:-admin}"
      FOREMAN_PASSWORD: "${FOREMAN_ADMIN_PASS:-changeme}"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # ── Checkmk (monitoring — polls agents on workload VMs via injected routes) ───
  checkmk:
    image: checkmk/check-mk-raw:latest
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-mon-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-mon-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_CHECKMK:-10.10.0.23}"
    cap_add:
      - NET_ADMIN
    volumes:
      - checkmk-data:/omd/sites
    environment:
      CMK_ADMIN_PASSWORD: "${CHECKMK_ADMIN_PASS:-changeme}"
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:5000/cmk/check_mk/login.py"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Jumphost (SSH bastion — sole external entry point) ──────────────────────
  jumphost:
    build:
      context: ./build/jumphost
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-vpn-001"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-vpn-001.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      mgmt-zone:
        ipv4_address: "${IP_JUMPHOST:-10.10.0.10}"
    cap_add:
      - NET_ADMIN
    volumes:
      - "${ADMIN_SSH_KEY_PATH}:/etc/jumphost/authorized_keys:ro"
    ports:
      - "2222:22"
    restart: unless-stopped
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"

  # Workload VMs are NOT defined here.
  # In hybrid mode (default): Vagrant/VirtualBox VMs from environments/dev/vagrant/Vagrantfile.topology
  # In docker mode:           Docker containers from environments/dev/docker/docker-compose.topology.yml
  # Both are generated from config/topology.json by scripts/gen-topology.sh
