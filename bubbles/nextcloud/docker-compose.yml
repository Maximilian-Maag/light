# Nextcloud service bubble — overlaid on the base dev stack.
#
# Run via:  ./scripts/add-bubble.sh nextcloud
# Remove:   ./scripts/rm-bubble.sh nextcloud
#
# Network isolation model:
#   bubble-nextcloud (10.20.1.0/24):
#     nextcloud-app, nextcloud-db, nextcloud-redis talk freely to each other
#     Jumphost, Ansible, Checkmk are added to this network (bridging from mgmt-zone)
#     No route to any other bubble network
#     No route to the flat workload network (10.20.0.0/24)
#
# This file EXTENDS the base docker-compose.yml via Docker Compose merge.
# Services listed here (ansible, checkmk, jumphost) have the bubble network
# ADDED to their existing network list — existing attachments are preserved.

networks:
  bubble-nextcloud:
    driver: bridge
    ipam:
      config:
        - subnet: "10.20.1.0/24"

services:

  # ── Extend management services into the bubble ─────────────────────────────
  # Docker Compose merge: these entries ADD bubble-nextcloud to the existing
  # network lists of ansible, checkmk, and jumphost without removing mgmt-zone.

  ansible:
    networks:
      bubble-nextcloud:
        ipv4_address: "10.20.1.2"

  checkmk:
    networks:
      bubble-nextcloud:
        ipv4_address: "10.20.1.3"

  jumphost:
    networks:
      bubble-nextcloud:
        ipv4_address: "10.20.1.10"

  # ── Bubble members ──────────────────────────────────────────────────────────

  nextcloud-app:
    build:
      context: ../../environments/dev/docker/build/workload
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-web-nextcloud"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-web-nextcloud.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      bubble-nextcloud:
        ipv4_address: "10.20.1.11"
    environment:
      PUPPET_SERVER:  "${IP_PUPPET:-10.10.0.21}"
      CHECKMK_SERVER: "${IP_CHECKMK:-10.10.0.23}"
      PULP_SERVER:    "${IP_PULP:-10.10.0.24}"
    ports:
      - "127.0.0.1:8443:443"      # dev access: https://localhost:8443
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nextcloud-db:
    build:
      context: ../../environments/dev/docker/build/workload
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-db-nextcloud"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-db-nextcloud.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      bubble-nextcloud:
        ipv4_address: "10.20.1.12"
    environment:
      PUPPET_SERVER:  "${IP_PUPPET:-10.10.0.21}"
      CHECKMK_SERVER: "${IP_CHECKMK:-10.10.0.23}"
      PULP_SERVER:    "${IP_PULP:-10.10.0.24}"
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nextcloud-redis:
    build:
      context: ../../environments/dev/docker/build/workload
      dockerfile: Dockerfile
    container_name: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-cache-nextcloud"
    hostname: "${LIGHT_ENV:-dev}-${LIGHT_LOCATION:-local}-srv-cache-nextcloud.${LIGHT_DOMAIN:-simple-test.org}"
    networks:
      bubble-nextcloud:
        ipv4_address: "10.20.1.13"
    environment:
      PUPPET_SERVER:  "${IP_PUPPET:-10.10.0.21}"
      CHECKMK_SERVER: "${IP_CHECKMK:-10.10.0.23}"
      PULP_SERVER:    "${IP_PULP:-10.10.0.24}"
    dns:
      - "${IP_DNS_PRIMARY:-10.10.0.30}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "22"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
